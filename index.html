<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد مسیرهای لجستیکی اوراسیا</title>
<style>/* ===== PASSWORD GATE ===== */
  #gate {
    position: fixed; inset: 0;
    background: #0a0e1a;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #gate-box {
    background: #111827;
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    width: 320px;
  }
  #gate-box h2 { color: #60a5fa; margin: 0 0 8px; font-size: 1.2rem; }
  #gate-box p  { color: #6b7280; font-size: 0.85rem; margin: 0 0 24px; }
  #gate-box input {
    width: 100%; padding: 10px 14px;
    background: #1f2937; border: 1px solid #374151;
    border-radius: 8px; color: #f9fafb;
    font-size: 1rem; text-align: center;
    box-sizing: border-box; margin-bottom: 12px;
    outline: none;
  }
  #gate-box input:focus { border-color: #3b82f6; }
  #gate-btn {
    width: 100%; padding: 10px;
    background: #2563eb; color: #fff;
    border: none; border-radius: 8px;
    font-size: 1rem; cursor: pointer;
  }
  #gate-btn:hover { background: #1d4ed8; }
  #gate-error { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; }

  /* ===== MAIN DASHBOARD ===== */
  #app { display: none; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0e1a; color: #e2e8f0; }

  header {
    background: linear-gradient(135deg, #0f172a, #1e3a5f);
    padding: 20px 30px;
    border-bottom: 1px solid #1e40af;
    display: flex; align-items: center; justify-content: space-between;}
  header h1 { font-size: 1.4rem; color: #60a5fa; }
  header span { font-size: 0.8rem; color: #6b7280; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .kpi-card {
    background: #111827; border: 1px solid #1e3a5f;
    border-radius: 10px; padding: 18px;
  }
  .kpi-card .label { font-size: 0.75rem; color: #6b7280; margin-bottom: 6px; }
  .kpi-card .value { font-size: 1.6rem; font-weight: 700; color: #60a5fa; }
  .kpi-card .sub   { font-size: 0.75rem; color: #9ca3af; margin-top: 4px; }

  /* Filters */
  .filters {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 24px;
  }
  .filter-btn {
    padding: 7px 16px; border-radius: 20px;
    border: 1px solid #374151; background: #1f2937;
    color: #9ca3af; cursor: pointer; font-size: 0.82rem;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: #2563eb; border-color: #2563eb; color: #fff;
  }

  /* Table */
  .table-wrap {
    background: #111827; border: 1px solid #1e3a5f;
    border-radius: 10px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #0f172a; padding: 12px 16px;
    text-align: right; font-size: 0.78rem;
    color: #6b7280; font-weight: 600;
    border-bottom: 1px solid #1e3a5f;
  }
  tbody tr { border-bottom: 1px solid #1e2d40; transition: background 0.15s; }
  tbody tr:hover { background: #1a2744; }
  tbody td { padding: 12px 16px; font-size: 0.83rem; }

  .badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 12px; font-size: 0.72rem; font-weight: 600;
  }
  .badge-sea   { background: #0c4a6e; color: #38bdf8; }
  .badge-land  { background: #14532d; color: #4ade80; }
  .badge-rail  { background: #3b0764; color: #c084fc; }
  .badge-multi { background: #431407; color: #fb923c; }

  .risk-bar { display: flex; align-items: center; gap: 8px; }
  .risk-track {
    flex: 1; height: 6px; background: #1f2937;
    border-radius: 3px; overflow: hidden;
  }
  .risk-fill { height: 100%; border-radius: 3px; }
  .risk-low  { background: #22c55e; }
  .risk-mid  { background: #f59e0b; }
  .risk-high { background: #ef4444; }

  .status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-left: 6px;
  }
  .dot-green  { background: #22c55e; }
  .dot-yellow { background: #f59e0b; }
  .dot-red    { background: #ef4444; }

  /* Add Route Modal */
  .add-btn {
    margin-bottom: 20px; padding: 9px 20px;
    background: #2563eb; color: #fff;
    border: none; border-radius: 8px;
    cursor: pointer; font-size: 0.85rem;
  }
  .add-btn:hover { background: #1d4ed8; }

  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center; justify-content: center;
    z-index: 1000;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #111827; border: 1px solid #1e3a5f;
    border-radius: 12px; padding: 28px;
    width: 480px; max-width: 95vw;
  }
  #modal h3 { color: #60a5fa; margin-bottom: 20px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 0.78rem; color: #9ca3af; margin-bottom: 5px; }
  .form-row input, .form-row select {
    width: 100%; padding: 8px 12px;
    background: #1f2937; border: 1px solid #374151;
    border-radius: 6px; color: #f9fafb; font-size: 0.85rem;
  }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: #3b82f6; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel {
    padding: 8px 18px; background: #374151; color: #9ca3af;
    border: none; border-radius: 6px; cursor: pointer;
  }
  .btn-save {
    padding: 8px 18px; background: #2563eb; color: #fff;
    border: none; border-radius: 6px; cursor: pointer;
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div id="gate-box">
    <h2>🔒 دسترسی محدود</h2>
    <p>داشبورد مسیرهای لجستیکی اوراسیا</p>
    <input type="password" id="pwd-input" placeholder="رمز عبور را وارد کنید" />
    <button id="gate-btn" onclick="checkPassword()">ورود</button>
    <div id="gate-error">رمز عبور اشتباه است</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <h1>🌐 داشبورد مسیرهای لجستیکی اوراسیا — ورود به ایران</h1>
    <span id="last-update"></span>
  </header>

  <div class="container">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- Filters -->
    <div class="filters" id="filters"></div>

    <!-- Add Route -->
    <button class="add-btn" onclick="openModal()">+ افزودن مسیر جدید</button>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>مسیر</th>
            <th>نوع حمل</th>
            <th>مدت (روز)</th>
            <th>هزینه تقریبی ($/TEU)</th>
            <th>ریسک گمرکی</th>
            <th>وضعیت</th><th>یادداشت</th>
          </tr>
        </thead>
        <tbody id="route-table"></tbody>
      </table>
    </div>
</div>

<!-- ADD ROUTE MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3>افزودن مسیر جدید</h3>
    <div class="form-row">
      <label>نام مسیر</label>
      <input type="text" id="f-name" placeholder="مثال: چین ← بندرعباس" />
    </div>
    <div class="form-row">
      <label>نوع حمل</label>
      <select id="f-type">
        <option value="sea">دریایی</option>
        <option value="land">زمینی</option>
        <option value="rail">ریلی</option>
        <option value="multi">ترکیبی</option>
      </select>
    </div>
    <div class="form-row">
      <label>مدت حمل (روز)</label>
      <input type="number" id="f-days" placeholder="25" />
    </div>
    <div class="form-row">
      <label>هزینه تقریبی ($/TEU)</label>
      <input type="number" id="f-cost" placeholder="1200" />
    </div>
    <div class="form-row">
      <label>ریسک گمرکی (۱–۱۰)</label>
      <input type="number" id="f-risk" min="1" max="10" placeholder="5" />
    </div>
    <div class="form-row">
      <label>وضعیت</label>
      <select id="f-status">
        <option value="active">فعال</option>
        <option value="slow">کند</option>
        <option value="blocked">مسدود</option>
      </select>
    </div>
    <div class="form-row">
      <label>یادداشت</label>
      <input type="text" id="f-note" placeholder="توضیح کوتاه..." />
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">انصراف</button>
      <button class="btn-save" onclick="saveRoute()">ذخیره</button>
    </div>
  </div>
</div>

<script>
// ─── PASSWORD ───────────────────────────────────────────────
const PASSWORD = "DanaEnergy_2026"; //

function checkPassword() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASSWORD) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initDashboard();
  } else {
    document.getElementById('gate-error').style.display = 'block';document.getElementById('pwd-input').value = '';
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// ─── DATA ────────────────────────────────────────────────────
const defaultRoutes = [
  { name: "چین ← قزاقستان ← مرز شمالی ایران", type: "rail", days: 18, cost: 1100, risk: 4, status: "active", note: "مسیر ریلی INSTC" },
  { name: "چین ← کراچی ← زاهدان", type: "multi", days: 28, cost: 950, risk: 7, status: "slow", note: "مرز سیستان و بلوچستان" },
  { name: "چین ← صحار/دقم ← بندرعباس", type: "multi", days: 22, cost: 1050, risk: 5, status: "active", note: "ترانشیپ عمان" },
  { name: "چین ← دبی ← خوزستان (عراق/کویت)", type: "multi", days: 30, cost: 1300, risk: 8, status: "slow", note: "مرز زمینی عراق" },
  { name: "چین ← مرسین ← مرز ترکیه ← ایران", type: "multi", days: 25, cost: 1200, risk: 6, status: "active", note: "گذر از ترکیه" },
  { name: "چین ← بندرعباس (مستقیم)", type: "sea", days: 20, cost: 900, risk: 3, status: "active", note: "مستقیم‌ترین مسیر دریایی" },
];

function loadRoutes() {
  const saved = localStorage.getItem('eurasiaRoutes');
  return saved ? JSON.parse(saved) : defaultRoutes;
}
function saveRoutes(routes) {
  localStorage.setItem('eurasiaRoutes', JSON.stringify(routes));
}

// ─── DASHBOARD ───────────────────────────────────────────────
let routes = [];
let activeFilter = 'all';

function initDashboard() {
  routes = loadRoutes();
  document.getElementById('last-update').textContent =
    'آخرین بروزرسانی: ' + new Date().toLocaleDateString('fa-IR');
  renderKPIs();
  renderFilters();
  renderTable();
}

function renderKPIs() {
  const active = routes.filter(r => r.status === 'active').length;
  const avgCost = Math.round(routes.reduce((s,r) => s+r.cost, 0) / routes.length);
  const avgDays = Math.round(routes.reduce((s,r) => s+r.days, 0) / routes.length);
  const highRisk = routes.filter(r => r.risk >= 7).length;

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card"><div class="label">کل مسیرها</div><div class="value">${routes.length}</div><div class="sub">مسیر ثبت‌شده</div></div>
    <div class="kpi-card"><div class="label">مسیرهای فعال</div><div class="value">${active}</div><div class="sub">در حال عملیات</div></div>
    <div class="kpi-card"><div class="label">میانگین هزینه</div><div class="value">$${avgCost}</div><div class="sub">به ازای هر TEU</div></div>
    <div class="kpi-card"><div class="label">میانگین زمان</div><div class="value">${avgDays}</div><div class="sub">روز</div></div>
    <div class="kpi-card"><div class="label">ریسک بالا</div><div class="value">${highRisk}</div><div class="sub">مسیر با ریسک ≥ ۷</div></div>
  `;
}

function renderFilters() {
  const types = [
    { key: 'all', label: 'همه' },
    { key: 'sea',   label: '🚢 دریایی' },
    { key: 'land',  label: '🚛 زمینی' },
    { key: 'rail',  label: '🚂 ریلی' },
    { key: 'multi', label: '🔀 ترکیبی' },
  ];
  document.getElementById('filters').innerHTML = types.map(t =>
    `<button class="filter-btn ${activeFilter===t.key?'active':''}"
      onclick="setFilter('${t.key}')">${t.label}</button>`
  ).join('');
}

function setFilter(f) {
  activeFilter = f;
  renderFilters();renderTable();
}

const typeLabel = { sea:'دریایی', land:'زمینی', rail:'ریلی', multi:'ترکیبی' };
const typeBadge = { sea:'badge-sea', land:'badge-land', rail:'badge-rail', multi:'badge-multi' };
const statusMap = {
  active: ['dot-green',  'فعال'],
  slow:   ['dot-yellow', 'کند'],
  blocked:['dot-red',    'مسدود'],
};

function renderTable() {
  const filtered = activeFilter === 'all' ? routes : routes.filter(r => r.type === activeFilter);
  const tbody = document.getElementById('route-table');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#6b7280;padding:30px">مسیری یافت نشد</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map((r, i) => {
    const riskPct = r.risk * 10;
    const riskClass = r.risk <= 3 ? 'risk-low' : r.risk <= 6 ? 'risk-mid' : 'risk-high';
    const [dotClass, statusText] = statusMap[r.status] || ['dot-yellow','نامشخص'];
    return `<tr>
      <td>${r.name}</td>
      <td><span class="badge ${typeBadge[r.type]}">${typeLabel[r.type]}</span></td>
      <td>${r.days}</td>
      <td>$${r.cost.toLocaleString()}</td>
      <td>
        <div class="risk-bar">
          <div class="risk-track"><div class="risk-fill ${riskClass}" style="width:${riskPct}%"></div></div>
          <span style="font-size:0.75rem;color:#9ca3af">${r.risk}/10</span>
        </div>
      </td>
      <td><span class="status-dot ${dotClass}"></span>${statusText}</td>
      <td style="color:#6b7280;font-size:0.78rem">${r.note}</td>
    </tr>`;
  }).join('');
}

// ─── MODAL ───────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  ['f-name','f-days','f-cost','f-risk','f-note'].forEach(id =>
    document.getElementById(id).value = '');
}
function saveRoute() {
  const name = document.getElementById('f-name').value.trim();
  const days = parseInt(document.getElementById('f-days').value);
  const cost = parseInt(document.getElementById('f-cost').value);
  const risk = parseInt(document.getElementById('f-risk').value);
  if (!name || isNaN(days) || isNaN(cost) || isNaN(risk)) {
    alert('لطفاً همه فیلدها را پر کنید'); return;
  }
  routes.push({
    name,
    type:   document.getElementById('f-type').value,
    days, cost, risk,
    status: document.getElementById('f-status').value,
    note:   document.getElementById('f-note').value.trim(),
  });
  saveRoutes(routes);
  renderKPIs();
  renderTable();
  closeModal();
}
</script>
</body>
</html>
