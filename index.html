<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dana Energy — Logistics Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #c9a84c;
    --accent2: #e8c96a;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Vazirmatn', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;}

  /* ── GATE ── */
  #gate {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a1f2e 0%, #0d1117 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .gate-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 48px 40px;
    text-align: center;
    width: 360px;
    box-shadow: 0 0 60px rgba(201,168,76,0.15);
  }
  .gate-logo {
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .gate-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 32px;
  }
  .gate-box input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    text-align: center;
    letter-spacing: 2px;
    outline: none;
    transition: border-color .2s;
  }
  .gate-box input:focus { border-color: var(--accent); }
  .gate-box button {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  .gate-box button:hover { background: var(--accent2); }
  #gate-err {
    display: none;
    margin-top: 12px;
    color: var(--red);
    font-size: 13px;
  }

  /* ── APP ── */
  #app { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-brand {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .header-title { font-size: 16px; font-weight: 600; }
  .lang-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* ── KPI ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }
  .kpi-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);color: #0d1117;font-weight: 600;
  }

  /* ── LAYOUT ── */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
    margin-bottom: 24px;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 14px;
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }
  tbody tr {
    border-bottom: 1px solid rgba(48,54,61,.5);
    cursor: pointer;
    transition: background .15s;
  }
  tbody tr:hover { background: rgba(201,168,76,.06); }
  tbody tr.selected { background: rgba(201,168,76,.12); }
  tbody td {
    padding: 11px 14px;
    font-size: 13px;
  }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-sea { background: rgba(88,166,255,.15); color: var(--blue); }
  .badge-land { background: rgba(63,185,80,.15); color: var(--green); }
  .badge-rail { background: rgba(201,168,76,.15); color: var(--accent); }
  .badge-multi { background: rgba(210,153,34,.15); color: var(--yellow); }
  .risk-low { color: var(--green); }
  .risk-med { color: var(--yellow); }
  .risk-high { color: var(--red); }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-left: 6px;
  }
  .dot-active { background: var(--green); }
  .dot-limited { background: var(--yellow); }
  .dot-inactive { background: var(--red); }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .detail-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);font-size: 13px;
  }
  .detail-content { padding: 20px; }
  .detail-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .detail-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid rgba(48,54,61,.5);
    font-size: 13px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--muted); }
  .detail-val { font-weight: 500; text-align: left; }
  .detail-note {
    margin-top: 16px;
    padding: 12px;
    background: rgba(201,168,76,.06);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* ── MAP ── */
  .map-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .map-toolbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .map-toolbar span { font-size: 13px; color: var(--muted); }
  .map-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .map-btn:hover { border-color: var(--accent); color: var(--accent); }
  .map-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; }
  #map { height: 420px; }

  /* ── ADD FORM ── */
  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .add-toggle {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .add-toggle:hover { background: rgba(255,255,255,.02); }
  .add-toggle-title { font-size: 14px; font-weight: 600; color: var(--accent); }
  .add-toggle-icon { color: var(--muted); font-size: 18px; transition: transform .2s; }
  .add-toggle-icon.open { transform: rotate(45deg); }
  .add-form {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }
  .add-form.open { display: block; }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--muted); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group select option { background: var(--surface); }
  .form-submit {
    margin-top: 16px;
    padding: 10px 28px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  .form-submit:hover { background: var(--accent2); }

  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .content-grid { grid-template-columns: 1fr; }
    main { padding: 16px; }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">Dana Energy</div>
    <div class="gate-title">Logistics Intelligence</div>
    <input type="password" id="pwd" placeholder="رمز عبور" onkeydown="if(event.key==='Enter')checkPwd()">
    <button onclick="checkPwd()">ورود</button>
    <div id="gate-err">رمز عبور اشتباه است</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div>
        <div class="header-brand">Dana Energy</div>
        <div class="header-title" id="h-title">داشبورد لجستیک اوراسیا</div>
      </div></div>
    <button class="lang-btn" onclick="toggleLang()">EN / FA</button>
  </header>

  <main>
    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label" id="k1-label">کل مسیرها</div>
        <div class="kpi-value" id="k1-val">—</div>
        <div class="kpi-sub" id="k1-sub">مسیر تعریف‌شده</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label" id="k2-label">مسیرهای فعال</div>
        <div class="kpi-value" id="k2-val">—</div>
        <div class="kpi-sub" id="k2-sub">وضعیت عملیاتی</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label" id="k3-label">میانگین هزینه</div>
        <div class="kpi-value" id="k3-val">—</div>
        <div class="kpi-sub" id="k3-sub">دلار / تن</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label" id="k4-label">میانگین زمان</div>
        <div class="kpi-value" id="k4-val">—</div>
        <div class="kpi-sub" id="k4-sub">روز</div>
      </div></div>

    <!-- FILTERS -->
    <div class="filters" id="filters"></div>

    <!-- TABLE + DETAIL -->
    <div class="content-grid">
      <div class="table-wrap">
        <div class="section-header" id="tbl-header">مسیرهای لجستیکی</div>
        <div style="overflow-x:auto">
          <table>
            <thead id="tbl-head"></thead>
            <tbody id="tbl-body"></tbody>
          </table>
        </div>
      </div>
      <div class="detail-panel">
        <div class="section-header" id="det-header">جزئیات مسیر</div>
        <div id="det-body">
          <div class="detail-empty" id="det-empty">یک مسیر را انتخاب کنید</div>
        </div>
      </div>
    </div>

    <!-- MAP -->
    <div class="map-section">
      <div class="map-toolbar">
        <span id="map-label">نمایش نقشه</span>
        <button class="map-btn active" id="btn-all-routes" onclick="showAllRoutes()">همه مسیرها</button>
        <button class="map-btn" id="btn-measure" onclick="toggleMeasure()">اندازه‌گیری فاصله</button>
        <span id="measure-info" style="color:var(--accent);font-size:12px"></span>
      </div>
      <div id="map"></div>
    </div>

    <!-- ADD ROUTE -->
    <div class="add-section">
      <div class="add-toggle" onclick="toggleForm()">
        <span class="add-toggle-title" id="add-title">افزودن مسیر جدید</span>
        <span class="add-toggle-icon" id="add-icon">+</span>
      </div>
      <div class="add-form" id="add-form">
        <div class="form-grid">
          <div class="form-group">
            <label id="fl-name-fa">نام مسیر (فارسی)</label>
            <input type="text" id="f-name-fa" placeholder="مثال: مسیر ابریشم">
          </div>
          <div class="form-group">
            <label id="fl-name-en">نام مسیر (انگلیسی)</label>
            <input type="text" id="f-name-en" placeholder="e.g. Silk Road Route">
          </div>
          <div class="form-group">
            <label id="fl-type">نوع حمل</label>
            <select id="f-type">
              <option value="sea">دریایی</option>
              <option value="land">زمینی</option>
              <option value="rail">ریلی</option>
              <option value="multi">چندوجهی</option>
            </select>
          </div>
          <div class="form-group">
            <label id="fl-dist">فاصله (کیلومتر)</label>
            <input type="number" id="f-dist" placeholder="12000">
          </div>
          <div class="form-group">
            <label id="fl-time">زمان (روز)</label>
            <input type="number" id="f-time" placeholder="25">
          </div>
          <div class="form-group">
            <label id="fl-cost">هزینه ($/تن)</label>
            <input type="number" id="f-cost" placeholder="180">
          </div>
          <div class="form-group">
            <label id="fl-risk">ریسک گمرکی</label>
            <select id="f-risk">
              <option value="low">پایین</option>
              <option value="medium">متوسط</option>
              <option value="high">بالا</option>
            </select>
          </div>
          <div class="form-group">
            <label id="fl-status">وضعیت</label>
            <select id="f-status">
              <option value="active">فعال</option>
              <option value="limited">محدود</option>
              <option value="inactive">غیرفعال</option>
            </select>
          </div>
          <div class="form-group">
            <label id="fl-cargo">نوع کالا</label>
            <input type="text" id="f-cargo" placeholder="کالای عمومی، تجهیزات، ...">
          </div>
          <div class="form-group">
            <label id="fl-note">یادداشت</label>
            <textarea id="f-note" placeholder="توضیحات اضافی..."></textarea>
          </div>
        </div>
        <button class="form-submit" onclick="addRoute()" id="f-submit">افزودن مسیر</button>
      </div>
    </div>
  </main>
</div>

<script>

// ── STATE ──
let activeFilter = 'all';
let selectedId = null;
let measureMode = false;
let measurePoints = [];
let measureMarkers = [];
let measureLine = null;
let map, routeLayers = [];

// ── GATE ──
function checkPwd() {
  const v = document.getElementById('pwd').value;
  if (v === 'DanaEnergy_2026') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('gate-err').style.display = 'block';
    document.getElementById('pwd').value = '';
  }
}

// ── INIT ──
function initApp() {
  renderAll();
  initMap();
}

function renderAll() {
  const t = T[lang];
  // header
  document.getElementById('h-title').textContent = t.hTitle;
  // kpi
  document.getElementById('k1-label').textContent = t.k1;
  document.getElementById('k1-sub').textContent = t.k1s;
  document.getElementById('k2-label').textContent = t.k2;
  document.getElementById('k2-sub').textContent = t.k2s;
  document.getElementById('k3-label').textContent = t.k3;
  document.getElementById('k3-sub').textContent = t.k3s;
  document.getElementById('k4-label').textContent = t.k4;
  document.getElementById('k4-sub').textContent = t.k4s;
  // kpi values
  const active = routes.filter(r => r.status === 'active');
  const avgCost = Math.round(routes.reduce((s,r) => s + r.cost, 0) / routes.length);
  const avgTime = Math.round(routes.reduce((s,r) => s + r.time, 0) / routes.length);
  document.getElementById('k1-val').textContent = routes.length;
  document.getElementById('k2-val').textContent = active.length;
  document.getElementById('k3-val').textContent = '$' + avgCost;
  document.getElementById('k4-val').textContent = avgTime;
  // section headers
  document.getElementById('tbl-header').textContent = t.tblHeader;
  document.getElementById('det-header').textContent = t.detHeader;
  document.getElementById('map-label').textContent = t.mapLabel;
  document.getElementById('btn-all-routes').textContent = t.btnAllRoutes;
  document.getElementById('btn-measure').textContent = t.btnMeasure;
  document.getElementById('add-title').textContent = t.addTitle;
  document.getElementById('f-submit').textContent = t.fSubmit;
  // form labels
  document.getElementById('fl-name-fa').textContent = t.flNameFa;
  document.getElementById('fl-name-en').textContent = t.flNameEn;
  document.getElementById('fl-type').textContent = t.flType;
  document.getElementById('fl-dist').textContent = t.flDist;
  document.getElementById('fl-time').textContent = t.flTime;
  document.getElementById('fl-cost').textContent = t.flCost;
  document.getElementById('fl-risk').textContent = t.flRisk;
  document.getElementById('fl-status').textContent = t.flStatus;
  document.getElementById('fl-cargo').textContent = t.flCargo;
  document.getElementById('fl-note').textContent = t.flNote;
  // dir
  document.documentElement.dir = lang === 'fa' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;

  renderFilters();
  renderTable();
  renderDetail();
}

// ── FILTERS ──
function renderFilters() {
  const t = T[lang];
  const el = document.getElementById('filters');
  el.innerHTML = '';
  t.filters.forEach((label, i) => {
    const val = t.filterVals[i];
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === val ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { activeFilter = val; renderAll(); drawRoutes(); };
    el.appendChild(btn);
  });
}

// ── TABLE ──
function renderTable() {
  const t = T[lang];
  const head = document.getElementById('tbl-head');
  head.innerHTML = `<tr>
    <th>${t.thRoute}</th><th>${t.thType}</th>
    <th>${t.thDist}</th><th>${t.thTime}</th>
    <th>${t.thCost}</th><th>${t.thRisk}</th>
    <th>${t.thStatus}</th>
  </tr>`;

  const filtered = routes.filter(r => activeFilter === 'all' || r.type === activeFilter);
  const body = document.getElementById('tbl-body');
  body.innerHTML = '';

  filtered.forEach(r => {
    const tr = document.createElement('tr');
    if (r.id === selectedId) tr.classList.add('selected');
    const name = lang === 'fa' ? r.fa : r.en;
    const typeBadge = `<span class="badge badge-${r.type}">${t.typeLabels[r.type]}</span>`;
    const riskClass = r.risk === 'low' ? 'risk-low' : r.risk === 'medium' ? 'risk-med' : 'risk-high';
    const dotClass = r.status === 'active' ? 'dot-active' : r.status === 'limited' ? 'dot-limited' : 'dot-inactive';
    tr.innerHTML = `
      <td>${name}</td>
      <td>${typeBadge}</td>
      <td>${r.dist.toLocaleString()}</td>
      <td>${r.time}</td>
      <td>$${r.cost}</td>
      <td class="${riskClass}">${t.riskLabels[r.risk]}</td>
      <td><span class="status-dot ${dotClass}"></span>${t.statusLabels[r.status]}</td>`;
    tr.onclick = () => { selectedId = r.id; renderTable(); renderDetail(); };
    body.appendChild(tr);
  });
}

// ── DETAIL ──
function renderDetail() {
  const t = T[lang];
  const el = document.getElementById('det-body');
  if (!selectedId) {
    el.innerHTML = `<div class="detail-empty">${t.detEmpty}</div>`;
    return;
  }
  const r = routes.find(x => x.id === selectedId);
  if (!r) return;
  const name = lang === 'fa' ? r.fa : r.en;
  const origin = lang === 'fa' ? r.origin_fa : r.origin_en;
  const dest = lang === 'fa' ? r.dest_fa : r.dest_en;
  const cargo = lang === 'fa' ? r.cargo_fa : r.cargo_en;
  const note = lang === 'fa' ? r.note_fa : r.note_en;
  const riskClass = r.risk === 'low' ? 'risk-low' : r.risk === 'medium' ? 'risk-med' : 'risk-high';
  const dotClass = r.status === 'active' ? 'dot-active' : r.status === 'limited' ? 'dot-limited' : 'dot-inactive';

  el.innerHTML = `<div class="detail-content">
    <div class="detail-name">${name}</div>
    <div class="detail-sub"><span class="badge badge-${r.type}">${t.typeLabels[r.type]}</span></div>
    <div class="detail-row"><span class="detail-key">${t.detOrigin}</span><span class="detail-val">${origin}</span></div>
    <div class="detail-row"><span class="detail-key">${t.detDest}</span><span class="detail-val">${dest}</span></div>
    <div class="detail-row"><span class="detail-key">${t.detDist}</span><span class="detail-val">${r.dist.toLocaleString()} ${t.km}</span></div>
    <div class="detail-row"><span class="detail-key">${t.detTime}</span><span class="detail-val">${r.time} ${t.days}</span></div>
    <div class="detail-row"><span class="detail-key">${t.detCost}</span><span class="detail-val">$${r.cost}${t.perTon}</span></div>
    <div class="detail-row"><span class="detail-key">${t.detCargo}</span><span class="detail-val">${cargo}</span></div>
    <div class="detail-row"><span class="detail-key">${t.detRisk}</span><span class="detail-val ${riskClass}">${t.riskLabels[r.risk]}</span></div>
    <div class="detail-row"><span class="detail-key">${t.detStatus}</span>
      <span class="detail-val"><span class="status-dot ${dotClass}"></span>${t.statusLabels[r.status]}</span></div>
    <div class="detail-note">${note}</div>
  </div>`;
}

// ── MAP ──
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([35, 65], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', maxZoom: 18
  }).addTo(map);
  drawRoutes();
  map.on('click', onMapClick);
}

const typeColors = { sea:'#58a6ff', land:'#3fb950', rail:'#c9a84c', multi:'#d29922' };

function drawRoutes() {
  routeLayers.forEach(l => map.removeLayer(l));
  routeLayers = [];
  const filtered = routes.filter(r => activeFilter === 'all' || r.type === activeFilter);
  filtered.forEach(r => {
    const color = typeColors[r.type] || '#fff';
    const line = L.polyline(r.coords, {
      color, weight: 3, opacity: 0.8,
      dashArray: r.type === 'sea' ? '8,6' : null
    }).addTo(map);
    const name = lang === 'fa' ? r.fa : r.en;
    line.bindPopup(`<b>${name}</b><br>${r.dist.toLocaleString()} km — ${r.time} days — $${r.cost}/t`);
    line.on('click', () => { selectedId = r.id; renderTable(); renderDetail(); });
    routeLayers.push(line);
    // endpoint markers
    const last = r.coords[r.coords.length - 1];
    const dot = L.circleMarker(last, {
      radius: 5, color, fillColor: color, fillOpacity: 1, weight: 2
    }).addTo(map);
    routeLayers.push(dot);
  });
}

function showAllRoutes() {
  activeFilter = 'all';
  renderAll();
  drawRoutes();
}

// ── MEASURE ──
function toggleMeasure() {
  measureMode = !measureMode;
  const btn = document.getElementById('btn-measure');
  const info = document.getElementById('measure-info');
  if (measureMode) {
    btn.classList.add('active');
    measurePoints = [];
    clearMeasure();
    info.textContent = T[lang].measureClick1;
    map.getContainer().style.cursor = 'crosshair';
  } else {
    btn.classList.remove('active');
    info.textContent = '';
    clearMeasure();
    map.getContainer().style.cursor = '';
  }
}

function clearMeasure() {
  measureMarkers.forEach(m => map.removeLayer(m));
  measureMarkers = [];
  if (measureLine) { map.removeLayer(measureLine); measureLine = null; }
}

function onMapClick(e) {
  if (!measureMode) return;
  const t = T[lang];
  measurePoints.push(e.latlng);
  const m = L.circleMarker(e.latlng, {
    radius: 6, color: '#c9a84c', fillColor: '#c9a84c', fillOpacity: 1
  }).addTo(map);
  measureMarkers.push(m);

  if (measurePoints.length === 1) {
    document.getElementById('measure-info').textContent = t.measureClick2;
  } else if (measurePoints.length === 2) {
    const dist = measurePoints[0].distanceTo(measurePoints[1]);
    const km = (dist / 1000).toFixed(0);
    measureLine = L.polyline(measurePoints, {
      color: '#c9a84c', weight: 2, dashArray: '6,4'
    }).addTo(map);
    document.getElementById('measure-info').textContent = t.measureResult + km.toLocaleString() + ' km';
    // reset for next measurement
    setTimeout(() => {
      measurePoints = [];
      clearMeasure();
      if (measureMode) document.getElementById('measure-info').textContent = t.measureClick1;
    }, 4000);
  }
}

// ── ADD ROUTE ──
function toggleForm() {
  const form = document.getElementById('add-form');
  const icon = document.getElementById('add-icon');
  const isOpen = form.classList.contains('open');
  form.classList.toggle('open', !isOpen);
  icon.classList.toggle('open', !isOpen);
}

function addRoute() {
  const nameFa = document.getElementById('f-name-fa').value.trim();
  const nameEn = document.getElementById('f-name-en').value.trim();
  const type = document.getElementById('f-type').value;
  const dist = parseInt(document.getElementById('f-dist').value) || 0;
  const time = parseInt(document.getElementById('f-time').value) || 0;
  const cost = parseInt(document.getElementById('f-cost').value) || 0;
  const risk = document.getElementById('f-risk').value;
  const status = document.getElementById('f-status').value;
  const cargo = document.getElementById('f-cargo').value.trim();
  const note = document.getElementById('f-note').value.trim();

  if (!nameFa && !nameEn) return;

  const newRoute = {
    id: Date.now(),
    type, dist, time, cost, risk, status,
    fa: nameFa || nameEn,
    en: nameEn || nameFa,
    origin_fa: '—', origin_en: '—',
    dest_fa: '—', dest_en: '—',
    cargo_fa: cargo, cargo_en: cargo,
    note_fa: note, note_en: note,
    coords: []
  };
  routes.push(newRoute);

  // clear form
  ['f-name-fa','f-name-en','f-dist','f-time','f-cost','f-cargo','f-note']
    .forEach(id => document.getElementById(id).value = '');

  renderAll();
  drawRoutes();
  toggleForm();
}

// ── LANG ──
function toggleLang() {
  lang = lang === 'fa' ? 'en' : 'fa';
  renderAll();
  if (map) drawRoutes();
}
